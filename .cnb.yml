# 1. 匹配以 auth-v 开头的标签 (如 auth-v2.1.2)
"auth-v*":
  tag_push:
    - imports: 
        - https://cnb.cool/civer/mytoken/-/blob/main/server-config.yml
      services:
        - docker
      stages:
        - name: 1. 匹配依赖缓存
          type: docker:cache
          options:
            dockerfile: cache.dockerfile
            tag: maven-common-cache
            # 必须包含所有被 COPY 的文件，否则上下文就是空的
            by: 
              - pom.xml
              - client-usermanage/pom.xml
          exports:
            name: DOCKER_CACHE_IMAGE

        - name: 2a. 编译 Auth-Server
          image: $DOCKER_CACHE_IMAGE
          script:
            # 仅提取版本号部分：auth-v2.1.2 -> 2.1.2
            - AUTH_VERSION=${CNB_BRANCH#auth-v}
            - printf '<settings><servers><server><id>cnb-maven</id><username>%s</username><password>%s</password></server></servers></settings>' "$MAVEN_USER" "$MAVEN_TOKEN" > ./temp_settings.xml
            - chmod 600 ./temp_settings.xml
            - mvn -B clean deploy -DskipTests -Drevision=$AUTH_VERSION -s ./temp_settings.xml --no-transfer-progress
            - mv target/*.jar target/Auth-Server.jar

        - name: 3a. 同步并重启 Auth-Server
          image: tencentcom/rsync
          settings:
            user: $SERVER_USER
            key: $SERVER_KEY
            hosts: [$SERVER_HOST]
            source: ./target/Auth-Server.jar
            target: /home/idp/auth_server/
            script:
              - cd /opt/1panel/runtime/java/idp_auth_server/
              - docker compose up -d --force-recreate

# 2. 匹配以 user-v 开头的标签 (如 user-v2.0.7)
"user-v*":
  tag_push:
    - imports: 
        - https://cnb.cool/civer/mytoken/-/blob/main/server-config.yml
      services:
        - docker
      stages:
        - name: 1. 匹配依赖缓存
          type: docker:cache
          options:
            dockerfile: cache.dockerfile
            tag: maven-common-cache
            # 必须包含所有被 COPY 的文件，否则上下文就是空的
            by: 
              - pom.xml
              - client-usermanage/pom.xml
          exports:
            name: DOCKER_CACHE_IMAGE

        - name: 2b. 编译 User-Manage
          image: $DOCKER_CACHE_IMAGE
          script:
            # 仅提取版本号部分：user-v2.0.7 -> 2.0.7
            - USER_VERSION=${CNB_BRANCH#user-v}
            - printf '<settings><servers><server><id>cnb-maven</id><username>%s</username><password>%s</password></server></servers></settings>' "$MAVEN_USER" "$MAVEN_TOKEN" > ./temp_settings.xml
            - chmod 600 ./temp_settings.xml
            - cd client-usermanage
            - mvn -B clean deploy -DskipTests -Drevision=$USER_VERSION -s ../temp_settings.xml --no-transfer-progress
            - mv target/*.jar target/UserManage-Server.jar

        - name: 3b. 同步并重启 User-Manage
          image: tencentcom/rsync
          settings:
            user: $SERVER_USER
            key: $SERVER_KEY
            hosts: [$SERVER_HOST]
            source: ./client-usermanage/target/UserManage-Server.jar
            target: /home/idp/user_manage/
